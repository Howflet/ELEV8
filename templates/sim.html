<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ELEV8 Simulator</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --dim: #8b949e;
      --blue: #58a6ff;
      --green: #3fb950;
      --yellow: #d29922;
      --cyan: #39c5cf;
      --orange: #f78166;
      --elev-bg: #1c2128;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Consolas', 'Cascadia Code', 'SF Mono', monospace;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    header h1 {
      font-size: 16px;
      color: var(--blue);
      letter-spacing: 2px;
      font-weight: 700;
    }

    .tick-badge {
      background: var(--elev-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 10px;
      color: var(--dim);
      font-size: 12px;
    }

    .tick-badge span { color: var(--text); }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--dim);
      transition: background 0.3s;
    }
    .status-dot.live { background: var(--green); animation: pulse 1.4s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .nav-link {
      margin-left: auto;
      color: var(--dim);
      text-decoration: none;
      font-size: 12px;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      transition: color 0.15s, border-color 0.15s;
    }
    .nav-link:hover { color: var(--text); border-color: var(--dim); }

    .btn-header {
      font-family: inherit;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .btn-configure {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--dim);
    }
    .btn-configure:hover, .btn-configure.active {
      border-color: var(--blue);
      color: var(--blue);
      background: #58a6ff11;
    }

    .btn-reset {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--dim);
    }
    .btn-reset:hover {
      border-color: var(--orange);
      color: var(--orange);
      background: #f7816611;
    }

    /* ── Config bar ── */
    .config-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .config-bar.hidden { display: none; }

    .config-fields {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .config-fields label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--dim);
      white-space: nowrap;
    }

    .config-fields input {
      font-family: inherit;
      font-size: 12px;
      background: var(--elev-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      padding: 3px 8px;
      width: 90px;
      transition: border-color 0.15s;
    }

    .config-fields input[type="text"] { width: 140px; }
    .config-fields input[type="number"] { width: 70px; }
    .config-fields input:focus { outline: none; border-color: var(--blue); }

    .btn-apply {
      font-family: inherit;
      font-size: 12px;
      padding: 4px 14px;
      background: #58a6ff22;
      border: 1px solid var(--blue);
      color: var(--blue);
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-apply:hover { background: #58a6ff44; }

    .cfg-status {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .cfg-status.show { opacity: 1; }
    .cfg-status.ok  { color: var(--green); background: #3fb95022; border: 1px solid #3fb95044; }
    .cfg-status.err { color: var(--orange); background: #f7816622; border: 1px solid #f7816644; }

    /* ── Live Mode bar ── */
    .live-bar { display:flex; align-items:center; gap:16px; padding:10px 20px;
      background:var(--surface); border-bottom:1px solid var(--border); flex-wrap:wrap; }
    .live-bar.hidden { display:none; }
    .live-indicator { font-size:11px; padding:2px 8px; border-radius:10px; font-weight:600; }
    .live-indicator.on  { color:var(--green); background:#3fb95022; border:1px solid #3fb95044; }
    .live-indicator.off { color:var(--dim);   background:transparent; border:1px solid var(--border); }
    .live-fields { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .live-fields label { display:flex; align-items:center; gap:6px; font-size:11px;
      color:var(--dim); white-space:nowrap; }
    .live-fields input, .live-fields select { font-family:inherit; font-size:12px;
      background:var(--elev-bg); border:1px solid var(--border); color:var(--text);
      border-radius:4px; padding:3px 8px; transition:border-color 0.15s; }
    .live-fields input[type="number"] { width:70px; }
    .live-fields select { width:140px; }
    .live-fields input:focus, .live-fields select:focus { outline:none; border-color:var(--green); }
    .btn-live-toggle { font-family:inherit; font-size:12px; padding:4px 14px;
      background:#3fb95022; border:1px solid var(--green); color:var(--green);
      border-radius:4px; cursor:pointer; transition:background 0.15s; }
    .btn-live-toggle:hover { background:#3fb95044; }
    .btn-live-toggle.stopping { background:#f7816622; border-color:var(--orange); color:var(--orange); }
    .btn-live-mode { background:transparent; border:1px solid var(--border); color:var(--dim); }
    .btn-live-mode:hover, .btn-live-mode.active { border-color:var(--green); color:var(--green);
      background:#3fb95011; }

    main {
      display: flex;
      flex: 1;
      gap: 0;
      overflow: hidden;
    }

    /* ── Building panel ── */
    .building-panel {
      flex: 0 0 auto;
      min-width: 280px;
      border-right: 1px solid var(--border);
      padding: 16px;
      overflow: auto;
    }

    .panel-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--dim);
      margin-bottom: 12px;
    }

    #building-grid {
      width: auto;
      border-collapse: collapse;
    }

    #building-grid th {
      color: var(--dim);
      font-size: 12px;
      padding: 5px 8px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    #building-grid th:first-child { text-align: right; }

    #building-grid td {
      padding: 3px 8px;
      text-align: center;
      border-bottom: 1px solid #1c2128;
      white-space: nowrap;
      height: 34px;
      vertical-align: middle;
    }

    #building-grid td:first-child {
      text-align: right;
      color: var(--dim);
      font-size: 12px;
      width: 40px;
    }

    #building-grid td:last-child {
      text-align: left;
      color: var(--yellow);
      font-size: 12px;
      white-space: normal;
      min-width: 80px;
    }

    .floor-row:hover { background: #1c2128; }

    .elevator-car {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .elevator-car.up    { background: #1a2f3a; border: 1px solid #58a6ff55; color: var(--blue); }
    .elevator-car.down  { background: #2f1a1a; border: 1px solid #f7816655; color: var(--orange); }
    .elevator-car.idle  { background: #1f3a2f; border: 1px solid #3fb95055; color: var(--green); }

    .elevator-car .pax-count {
      font-size: 11px;
      opacity: 0.85;
    }

    .dest-dot {
      color: var(--yellow);
      opacity: 0.7;
      font-size: 13px;
    }

    /* ── Right side panels ── */
    .side-panels {
      flex: 1;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel {
      border-bottom: 1px solid var(--border);
      padding: 16px;
      overflow-y: auto;
    }

    .panel:last-child { border-bottom: none; }

    /* Passengers */
    .passengers-panel { flex: 0 0 auto; max-height: 280px; }

    #passenger-table {
      width: 100%;
      border-collapse: collapse;
    }

    #passenger-table th {
      color: var(--dim);
      font-size: 12px;
      text-align: left;
      padding: 4px 10px;
      border-bottom: 1px solid var(--border);
    }

    #passenger-table td {
      padding: 4px 10px;
      border-bottom: 1px solid #1c2128;
      font-size: 13px;
    }

    #passenger-table tr:hover td { background: #1c2128; }

    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-waiting   { background: #d2992222; color: var(--yellow); border: 1px solid #d2992244; }
    .status-boarding  { background: #3fb95022; color: var(--green);  border: 1px solid #3fb95044; }
    .status-riding    { background: #39c5cf22; color: var(--cyan);   border: 1px solid #39c5cf44; }
    .status-leaving   { background: #f7816622; color: var(--orange); border: 1px solid #f7816644; }
    .status-arrived   { background: #3fb95011; color: #7ee787;       border: 1px solid #3fb95033; }
    .status-abandoned { background: #7d859022; color: var(--dim);    border: 1px solid #7d859044; }
    .status-denied    { background: #f7816622; color: var(--orange); border: 1px solid #f7816644; }

    /* ── Metrics panel ── */
    .metrics-panel { flex: 0 0 auto; max-height: 210px; }

    .metrics-summary {
      font-size: 12px;
      color: var(--dim);
      padding: 2px 0 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    .metrics-summary span { color: var(--text); }

    #floor-stats-table {
      width: 100%;
      border-collapse: collapse;
    }
    #floor-stats-table th {
      color: var(--dim);
      font-size: 12px;
      text-align: left;
      padding: 3px 10px;
      border-bottom: 1px solid var(--border);
    }
    #floor-stats-table th:not(:first-child) { text-align: right; }
    #floor-stats-table td {
      padding: 3px 10px;
      border-bottom: 1px solid #1c2128;
      font-size: 13px;
    }
    #floor-stats-table td:not(:first-child) { text-align: right; color: var(--dim); }
    #floor-stats-table tr:hover td { background: #1c2128; }

    .wait-live   { color: var(--yellow); }
    .wait-done   { color: var(--dim); font-size: 12px; }

    /* Floor access level badge */
    .access-badge {
      font-size: 11px;
      color: var(--yellow);
      margin-left: 3px;
    }
    .floor-row.floor-restricted td:first-child { color: var(--yellow); }

    /* Event log */
    .log-panel { flex: 1; min-height: 120px; }

    #event-log {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .log-entry {
      font-size: 12px;
      color: var(--dim);
      padding: 2px 0;
      border-bottom: 1px solid #1c212833;
      animation: fadein 0.3s ease;
    }

    .log-entry:first-child { color: var(--text); }

    @keyframes fadein { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }

    .log-empty { color: var(--border); font-style: italic; font-size: 12px; }

    /* ── Smooth elevator shaft overlay ── */
    .building-grid-wrapper {
      position: relative;
    }

    #shaft-container {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .elev-shaft {
      position: absolute;
      overflow: visible;
    }

    .elev-car-overlay {
      position: absolute;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 700;
      height: 28px;
      width: calc(100% - 8px);
      left: 4px;
      white-space: nowrap;
      overflow: hidden;
      /* transition duration is set dynamically to match seconds_per_floor */
      transition: bottom 1s ease-in-out;
    }

    .elev-car-overlay.up   { background: #1a2f3a; border: 1px solid #58a6ff55; color: var(--blue); }
    .elev-car-overlay.down { background: #2f1a1a; border: 1px solid #f7816655; color: var(--orange); }
    .elev-car-overlay.idle { background: #1f3a2f; border: 1px solid #3fb95055; color: var(--green); }

    /* Doors open: brighter border + subtle glow */
    .elev-car-overlay.door-open.up   { border-color: var(--blue);   box-shadow: 0 0 7px #58a6ff44; }
    .elev-car-overlay.door-open.down { border-color: var(--orange); box-shadow: 0 0 7px #f7816644; }
    .elev-car-overlay.door-open.idle { border-color: var(--green);  box-shadow: 0 0 7px #3fb95044; }

    .elev-car-overlay .pax-count { font-size: 11px; opacity: 0.85; }
  </style>
</head>
<body>

<header>
  <h1>ELEV8</h1>
  <div class="tick-badge">Tick&nbsp;<span id="tick-count">—</span></div>
  <div class="status-dot" id="status-dot"></div>
  <span id="connection-label" style="font-size:11px;color:var(--dim)">connecting…</span>
  <button class="btn-header btn-configure" id="btn-configure">Configure</button>
  <button class="btn-header btn-live-mode" id="btn-live-mode">Live Mode</button>
  <button class="btn-header btn-reset" id="btn-reset">Reset</button>

</header>

<div class="config-bar hidden" id="config-bar">
  <div class="config-fields">
    <label>Name    <input type="text"   id="cfg-name"      placeholder="Building name"></label>
    <label>Floors  <input type="number" id="cfg-floors"    min="2"   step="1"></label>
    <label>Elevators <input type="number" id="cfg-elevators" min="1" step="1"></label>
    <label>Capacity  <input type="number" id="cfg-capacity"  min="1" step="1"></label>
    <label>Tick (s)  <input type="number" id="cfg-tick"      min="0.1" step="0.1"></label>
    <label>Abandon (s) <input type="number" id="cfg-abandon" min="0" step="5" title="Seconds before passenger gives up (0 = never)"></label>
    <button class="btn-apply" id="btn-apply">Apply</button>
  </div>
  <span class="cfg-status" id="cfg-status"></span>
</div>

<div class="live-bar hidden" id="live-bar">
  <span class="live-indicator off" id="live-indicator">OFF</span>
  <div class="live-fields">
    <label>Rate (pax/min)
      <input type="number" id="lm-rate" min="0.1" max="120" step="0.5" value="10">
    </label>
    <label>Pattern
      <select id="lm-pattern">
        <option value="random">Random</option>
        <option value="morning_rush">Morning Rush</option>
        <option value="evening_rush">Evening Rush</option>
        <option value="lunch_rush">Lunch Rush</option>
      </select>
    </label>
    <label id="lm-caf-label" style="display:none">Cafeteria Floor
      <input type="number" id="lm-cafeteria" min="0" step="1" value="5">
    </label>
  </div>
  <button class="btn-live-toggle" id="btn-live-toggle">Start Live Mode</button>
  <span class="cfg-status" id="lm-status"></span>
</div>

<main>
  <!-- Building visualization -->
  <div class="building-panel">
    <div class="panel-title" id="building-name">Building</div>
    <div class="building-grid-wrapper" id="building-grid-wrapper">
      <table id="building-grid">
        <thead id="building-head"></thead>
        <tbody id="building-body"></tbody>
      </table>
      <div id="shaft-container"></div>
    </div>
  </div>

  <!-- Right panels -->
  <div class="side-panels">

    <!-- Passengers -->
    <div class="panel passengers-panel">
      <div class="panel-title">Passengers</div>
      <table id="passenger-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>From</th>
            <th>To</th>
            <th>Status</th>
            <th>Wait</th>
          </tr>
        </thead>
        <tbody id="passenger-body">
          <tr><td colspan="5" style="color:var(--dim);font-size:11px;padding:8px 10px">No passengers yet</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Metrics -->
    <div class="panel metrics-panel">
      <div class="panel-title">Metrics</div>
      <div class="metrics-summary" id="metrics-summary">—</div>
      <table id="floor-stats-table">
        <thead>
          <tr><th>Floor</th><th>Served</th><th>Avg Wait</th><th>Max Wait</th></tr>
        </thead>
        <tbody id="floor-stats-body">
          <tr><td colspan="4" style="color:var(--dim);font-size:11px;padding:6px 10px">No completed trips yet</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Event log -->
    <div class="panel log-panel">
      <div class="panel-title">Event Log</div>
      <div id="event-log"><span class="log-empty">No events yet</span></div>
    </div>

  </div>
</main>

<script>
  let numElevators = 0;
  let numFloors = 0;
  let shaftsReady = false;
  const ROW_HEIGHT = 34;   // must match #building-grid td height in CSS
  const CAR_HEIGHT  = 28;

  const DIRECTION_ARROW = { UP: '▲', DOWN: '▼', IDLE: '■' };

  function secondsSince(iso) {
    if (!iso) return null;
    return Math.round((Date.now() - new Date(iso).getTime()) / 1000);
  }

  function secondsBetween(isoA, isoB) {
    if (!isoA || !isoB) return null;
    return Math.round((new Date(isoB) - new Date(isoA)) / 1000);
  }

  function fmtWait(secs) {
    if (secs === null || secs === undefined || isNaN(secs)) return '—';
    if (secs < 60) return secs + 's';
    return Math.floor(secs / 60) + 'm ' + (secs % 60) + 's';
  }
  const STATUS_CLASS = {
    waiting:   'status-waiting',
    boarding:  'status-boarding',
    riding:    'status-riding',
    leaving:   'status-leaving',
    arrived:   'status-arrived',
    abandoned: 'status-abandoned',
    denied:    'status-denied',
  };

  async function fetchState() {
    try {
      const res = await fetch('/api/elevator/state');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      applyState(json.state);
      setConnected(true);
    } catch (e) {
      setConnected(false);
    }
  }

  function setConnected(ok) {
    const dot = document.getElementById('status-dot');
    const label = document.getElementById('connection-label');
    if (ok) {
      dot.className = 'status-dot live';
      label.textContent = 'live';
    } else {
      dot.className = 'status-dot';
      label.textContent = 'disconnected';
    }
  }

  function applyState(state) {
    document.getElementById('tick-count').textContent = state.tick;
    if (state.name) document.getElementById('building-name').textContent = state.name;

    const floors = state.floors;
    const elevators = state.elevators;

    if (elevators.length !== numElevators || floors !== numFloors) {
      numElevators = elevators.length;
      numFloors = floors;
      buildHeaders(elevators);
      shaftsReady = false;  // force shaft rebuild on next render
    }

    renderBuilding(state);
    updateShafts(state);
    renderPassengers(state);
    renderMetrics(state);
    renderLog(state.log || []);
    if (state.live_mode) applyLiveMode(state.live_mode);
  }

  const ELEV_COL_W = 90;  // px per elevator column

  function buildHeaders(elevators) {
    const head = document.getElementById('building-head');
    let html = '<tr><th style="width:40px">Floor</th>';
    for (const e of elevators)
      html += `<th style="width:${ELEV_COL_W}px;min-width:${ELEV_COL_W}px">Elev ${e.elevator_id}</th>`;
    html += '<th style="min-width:100px">Waiting</th></tr>';
    head.innerHTML = html;
  }

  function renderBuilding(state) {
    const { floors, elevators, waiting, floor_access } = state;
    const fa = floor_access || {};
    const body = document.getElementById('building-body');
    let html = '';

    for (let f = floors - 1; f >= 0; f--) {
      const minLevel = fa[String(f)] || 0;
      const restricted = minLevel > 0;
      const floorLabel = restricted
        ? `${f + 1}<span class="access-badge">L${minLevel}</span>`
        : `${f + 1}`;
      html += `<tr class="floor-row${restricted ? ' floor-restricted' : ''}"><td>${floorLabel}</td>`;

      // Elevator columns: destination dots only — cars are rendered in the shaft overlay
      for (const elev of elevators) {
        if (elev.destination_floors.includes(f)) {
          html += `<td><span class="dest-dot">◦</span></td>`;
        } else {
          html += `<td></td>`;
        }
      }

      const waitList = waiting[String(f)] || [];
      if (waitList.length > 0) {
        const paxStrs = waitList.map(p => `P${p.passenger_id}→${p.destination_floor + 1}`).join('<br>');
        html += `<td>${paxStrs}</td>`;
      } else {
        html += `<td></td>`;
      }

      html += '</tr>';
    }

    body.innerHTML = html;
  }

  // ── Smooth elevator shaft overlay ──
  function updateShafts(state) {
    const { floors, elevators, seconds_per_floor } = state;
    const wrapper  = document.getElementById('building-grid-wrapper');
    const shaftCtn = document.getElementById('shaft-container');
    if (!wrapper || !shaftCtn) return;

    // Rebuild shaft DOM elements when elevator count changes
    if (!shaftsReady) {
      shaftCtn.innerHTML = '';
      for (let i = 0; i < elevators.length; i++) {
        const shaft = document.createElement('div');
        shaft.className = 'elev-shaft';
        shaft.id = `shaft-${i}`;
        const car = document.createElement('div');
        car.className = 'elev-car-overlay idle';
        car.id = `car-${i}`;
        shaft.appendChild(car);
        shaftCtn.appendChild(shaft);
      }
      shaftsReady = true;
    }

    // Measure column positions from the rendered table header
    const headRow = document.querySelector('#building-head tr');
    if (!headRow) return;
    const wrapperRect = wrapper.getBoundingClientRect();
    const headerHeight = document.getElementById('building-head').getBoundingClientRect().height;
    const ths = headRow.querySelectorAll('th');
    const shaftHeight = floors * ROW_HEIGHT;

    for (let i = 0; i < elevators.length; i++) {
      const elev  = elevators[i];
      const th    = ths[i + 1];   // +1: skip the "Floor" column
      if (!th) continue;

      const thRect = th.getBoundingClientRect();
      const shaft  = document.getElementById(`shaft-${i}`);
      const car    = document.getElementById(`car-${i}`);
      if (!shaft || !car) continue;

      // Place shaft over its table column, starting below the header
      shaft.style.left   = (thRect.left - wrapperRect.left) + 'px';
      shaft.style.width  = thRect.width + 'px';
      shaft.style.top    = headerHeight + 'px';
      shaft.style.height = shaftHeight + 'px';

      // Animate car to floor position (bottom=0 is floor 0, bottom=shaftHeight-ROW_HEIGHT is top floor)
      const carBottom = elev.current_floor * ROW_HEIGHT + Math.round((ROW_HEIGHT - CAR_HEIGHT) / 2);
      car.style.transition = `bottom ${seconds_per_floor}s ease-in-out`;
      car.style.bottom = carBottom + 'px';

      // Direction class + door-open highlight
      const dir      = elev.direction;
      const dirCls   = dir === 'UP' ? 'up' : dir === 'DOWN' ? 'down' : 'idle';
      const doorOpen = elev.door === 'OPEN';
      car.className  = `elev-car-overlay ${dirCls}${doorOpen ? ' door-open' : ''}`;

      const arrow = DIRECTION_ARROW[dir] || '■';
      const pax   = elev.passengers.length;
      const cap   = elev.capacity;
      car.innerHTML = `${arrow} E${elev.elevator_id} <span class="pax-count">${pax}/${cap}</span>`;
    }
  }

  function renderPassengers(state) {
    const allPassengers = new Map();

    for (const [floor, list] of Object.entries(state.waiting)) {
      for (const p of list) allPassengers.set(p.passenger_id, { ...p, from: parseInt(floor) });
    }

    for (const elev of state.elevators) {
      for (const p of elev.passengers) {
        if (!allPassengers.has(p.passenger_id)) {
          allPassengers.set(p.passenger_id, { ...p, from: '?' });
        }
      }
    }

    // Include recently abandoned / denied passengers (shown dimly at bottom)
    for (const p of (state.terminated_passengers || [])) {
      if (!allPassengers.has(p.passenger_id)) {
        allPassengers.set(p.passenger_id, { ...p, from: '?' });
      }
    }

    const body = document.getElementById('passenger-body');
    if (allPassengers.size === 0) {
      body.innerHTML = '<tr><td colspan="5" style="color:var(--dim);font-size:11px;padding:8px 10px">No active passengers</td></tr>';
      return;
    }

    let html = '';
    for (const [id, p] of [...allPassengers.entries()].sort((a, b) => a[0] - b[0])) {
      const statusClass = STATUS_CLASS[p.status] || '';
      const dimmed = (p.status === 'abandoned' || p.status === 'denied') ? ' style="opacity:0.5"' : '';

      let waitHtml = '<td>—</td>';
      if (p.status === 'waiting') {
        const secs = secondsSince(p.requested_at);
        waitHtml = `<td><span class="wait-live">${fmtWait(secs)}</span></td>`;
      } else if (p.boarded_at && p.requested_at) {
        const secs = secondsBetween(p.requested_at, p.boarded_at);
        waitHtml = `<td><span class="wait-done">${fmtWait(secs)}</span></td>`;
      }

      html += `<tr${dimmed}>
        <td>P${p.passenger_id}</td>
        <td style="color:var(--dim)">${p.from === '?' ? '?' : p.from + 1}</td>
        <td style="color:var(--dim)">${p.destination_floor + 1}</td>
        <td><span class="status-badge ${statusClass}">${p.status}</span></td>
        ${waitHtml}
      </tr>`;
    }
    body.innerHTML = html;
  }

  function renderMetrics(state) {
    const summary    = state.summary    || {};
    const floorStats = state.floor_stats || {};

    // Summary line
    const summaryEl = document.getElementById('metrics-summary');
    if (summary.total_served > 0) {
      summaryEl.innerHTML =
        `Served: <span>${summary.total_served}</span>` +
        `&ensp;·&ensp;Avg wait: <span>${fmtWait(summary.avg_wait_secs)}</span>` +
        `&ensp;·&ensp;Avg journey: <span>${fmtWait(summary.avg_journey_secs)}</span>`;
    } else {
      summaryEl.innerHTML = '—';
    }

    // Per-floor table
    const body  = document.getElementById('floor-stats-body');
    const floors = Object.keys(floorStats).map(Number).sort((a, b) => a - b);

    if (floors.length === 0) {
      body.innerHTML = '<tr><td colspan="4" style="color:var(--dim);font-size:11px;padding:6px 10px">No completed trips yet</td></tr>';
      return;
    }

    let html = '';
    for (const f of floors) {
      const s = floorStats[String(f)];
      html += `<tr>
        <td>${f + 1}</td>
        <td>${s.served}</td>
        <td>${fmtWait(s.avg_wait)}</td>
        <td>${fmtWait(s.max_wait)}</td>
      </tr>`;
    }
    body.innerHTML = html;
  }

  let _lastLogKey = null;

  function renderLog(lines) {
    const el = document.getElementById('event-log');
    if (!lines || lines.length === 0) {
      if (_lastLogKey !== '') {
        el.innerHTML = '<span class="log-empty">No events yet</span>';
        _lastLogKey = '';
      }
      return;
    }
    const key = lines.join('\x00');
    if (key === _lastLogKey) return;
    _lastLogKey = key;
    el.innerHTML = [...lines].reverse()
      .map(l => `<div class="log-entry">${escapeHtml(l)}</div>`)
      .join('');
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  fetchState();
  setInterval(fetchState, 500);

  // ── Configure ──
  const configBar   = document.getElementById('config-bar');
  const btnConfigure = document.getElementById('btn-configure');
  const btnApply    = document.getElementById('btn-apply');
  const btnReset    = document.getElementById('btn-reset');
  const cfgStatus   = document.getElementById('cfg-status');

  async function loadConfig() {
    try {
      const res = await fetch('/api/config');
      const json = await res.json();
      const c = json.config;
      document.getElementById('cfg-name').value      = c.name;
      document.getElementById('cfg-floors').value    = c.floors;
      document.getElementById('cfg-elevators').value = c.num_elevators;
      document.getElementById('cfg-capacity').value  = c.elevator_capacity;
      document.getElementById('cfg-tick').value      = c.seconds_per_floor;
      document.getElementById('cfg-abandon').value   = c.abandon_after_seconds ?? 90;
    } catch (_) {}
  }

  btnConfigure.addEventListener('click', () => {
    const open = !configBar.classList.contains('hidden');
    if (open) {
      configBar.classList.add('hidden');
      btnConfigure.classList.remove('active');
    } else {
      loadConfig();
      configBar.classList.remove('hidden');
      btnConfigure.classList.add('active');
    }
  });

  function showCfgStatus(msg, ok) {
    cfgStatus.textContent = msg;
    cfgStatus.className = 'cfg-status show ' + (ok ? 'ok' : 'err');
    setTimeout(() => { cfgStatus.classList.remove('show'); }, 3000);
  }

  btnApply.addEventListener('click', async () => {
    const payload = {
      name:              document.getElementById('cfg-name').value.trim(),
      floors:            parseInt(document.getElementById('cfg-floors').value),
      num_elevators:        parseInt(document.getElementById('cfg-elevators').value),
      elevator_capacity:    parseInt(document.getElementById('cfg-capacity').value),
      seconds_per_floor:    parseFloat(document.getElementById('cfg-tick').value),
      abandon_after_seconds: parseFloat(document.getElementById('cfg-abandon').value),
    };
    try {
      const res = await fetch('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const json = await res.json();
      if (res.ok) {
        showCfgStatus('Applied', true);
        configBar.classList.add('hidden');
        btnConfigure.classList.remove('active');
        numElevators = 0; numFloors = 0; // force header rebuild
      } else {
        showCfgStatus(json.message || 'Error', false);
      }
    } catch (e) {
      showCfgStatus('Request failed', false);
    }
  });

  // ── Reset ──
  btnReset.addEventListener('click', async () => {
    btnReset.disabled = true;
    try {
      await fetch('/api/reset', { method: 'POST' });
      numElevators = 0; numFloors = 0; // force header rebuild
    } catch (_) {}
    btnReset.disabled = false;
  });

  // ── Live Mode ──
  let liveActive = false;

  document.getElementById('btn-live-mode').addEventListener('click', () => {
    const bar = document.getElementById('live-bar');
    const btn = document.getElementById('btn-live-mode');
    const open = !bar.classList.contains('hidden');
    bar.classList.toggle('hidden', open);
    btn.classList.toggle('active', !open);
  });

  document.getElementById('lm-pattern').addEventListener('change', function () {
    document.getElementById('lm-caf-label').style.display =
      this.value === 'lunch_rush' ? 'flex' : 'none';
  });

  document.getElementById('btn-live-toggle').addEventListener('click', async () => {
    const btn = document.getElementById('btn-live-toggle');
    btn.disabled = true;
    try {
      if (!liveActive) {
        const payload = {
          rate_per_minute: parseFloat(document.getElementById('lm-rate').value),
          pattern:         document.getElementById('lm-pattern').value,
        };
        const caf = document.getElementById('lm-cafeteria').value;
        if (payload.pattern === 'lunch_rush' && caf !== '')
          payload.cafeteria_floor = parseInt(caf);
        const res = await fetch('/api/live-mode/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const json = await res.json();
        if (!res.ok) { showLmStatus(json.message || 'Error', false); return; }
      } else {
        await fetch('/api/live-mode/stop', { method: 'POST' });
      }
    } catch (e) {
      showLmStatus('Request failed', false);
    } finally {
      btn.disabled = false;
    }
  });

  function applyLiveMode(lm) {
    liveActive = lm.active;
    const ind = document.getElementById('live-indicator');
    const btn = document.getElementById('btn-live-toggle');
    if (lm.active) {
      ind.textContent = `ON · ${lm.passengers_spawned} pax · ${lm.pattern.replace(/_/g, ' ')}`;
      ind.className = 'live-indicator on';
      btn.textContent = 'Stop Live Mode';
      btn.classList.add('stopping');
    } else {
      ind.textContent = 'OFF';
      ind.className = 'live-indicator off';
      btn.textContent = 'Start Live Mode';
      btn.classList.remove('stopping');
    }
  }

  function showLmStatus(msg, ok) {
    const el = document.getElementById('lm-status');
    el.textContent = msg;
    el.className = 'cfg-status show ' + (ok ? 'ok' : 'err');
    setTimeout(() => el.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
